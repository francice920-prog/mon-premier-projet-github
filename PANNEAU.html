<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Panneau publicitaire rotatif - Couleurs dynamiques</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            margin-top: 40px;
        }

        .scene {
            width: 300px;
            height: 300px;
            perspective: 1000px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCube 9s infinite linear;
        }

        .face {
            position: absolute;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            border: 2px solid #000;
            border-radius: 10px;
            animation: changeColor 9s infinite linear;
        }

        .front  { transform: rotateY(  0deg) translateZ(150px); }
        .right  { transform: rotateY( 90deg) translateZ(150px); }
        .back   { transform: rotateY(180deg) translateZ(150px); }
        .left   { transform: rotateY(-90deg) translateZ(150px); }

        @keyframes rotateCube {
            0%   { transform: rotateY(0deg); }
            25%  { transform: rotateY(-90deg); }
            50%  { transform: rotateY(-180deg); }
            75%  { transform: rotateY(-270deg); }
            100% { transform: rotateY(-360deg); }
        }

        @keyframes changeColor {
            0%   { background-color: #007bff; }   /* blue */
            25%  { background-color: #28a745; }   /* green */
            50%  { background-color: #dc3545; }   /* red */
            75%  { background-color: #ffc107; }   /* yellow */
            100% { background-color: #007bff; }
        }
    </style>
</head>
<body>
    <h2>Panneau publicitaire rotatif </h2>

    <div class="scene">
        <div class="cube">
            <div class="face front"></div>
            <div class="face right"></div>
            <div class="face back"></div>
            <div class="face left"></div>
        </div>
    </div>
</body>
</html>
