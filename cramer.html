<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Résolution de système par Cramer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: #f0f0f0;
    }

    .container {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    table {
      margin: auto;
    }

    table input {
      width: 60px;
      padding: 5px;
      margin: 3px;
      text-align: center;
    }

    .buttons {
      text-align: center;
      margin-top: 15px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #resoudre {
      background-color: #28a745;
      color: white;
    }

    #reinitialiser {
      background-color: #dc3545;
      color: white;
    }

    .result {
      text-align: center;
      margin-top: 20px;
      font-size: 18px;
      color: #007bff;
    }

    .delta {
      font-size: 16px;
      color: #555;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Résolution par la méthode de Cramer</h1>
    <table>
      <tr>
        <td><input id="a11" type="number" placeholder="a11">X + </td>
        <td><input id="a12" type="number" placeholder="a12">Y + </td>
        <td><input id="a13" type="number" placeholder="a13">Z</td>
        <td>=</td>
        <td><input id="b1" type="number" placeholder="b1"></td>
      </tr>
      <tr>
        <td><input id="a21" type="number" placeholder="a21">X + </td>
        <td><input id="a22" type="number" placeholder="a22">Y +</td>
        <td><input id="a23" type="number" placeholder="a23">Z</td>
        <td>=</td>
        <td><input id="b2" type="number" placeholder="b2"></td>
      </tr>
      <tr>
        <td><input id="a31" type="number" placeholder="a31">X + </td>
        <td><input id="a32" type="number" placeholder="a32">Y +</td>
        <td><input id="a33" type="number" placeholder="a33">Z</td>
        <td>=</td>
        <td><input id="b3" type="number" placeholder="b3"></td>
      </tr>
    </table>

    <div class="buttons">
      <button id="resoudre" onclick="resoudre()">RESOUDRE</button>
      <button id="reinitialiser" onclick="reinitialiser()">RÉINITIALISER</button>
    </div>

    <div class="result" id="resultat"></div>
  </div>

  <script>
    function det3x3(m) {
      return m[0][0]*(m[1][1]*m[2][2] - m[1][2]*m[2][1]) -
             m[0][1]*(m[1][0]*m[2][2] - m[1][2]*m[2][0]) +
             m[0][2]*(m[1][0]*m[2][1] - m[1][1]*m[2][0]);
    }

    function resoudre() {
      let a11 = +document.getElementById('a11').value;
      let a12 = +document.getElementById('a12').value;
      let a13 = +document.getElementById('a13').value;
      let a21 = +document.getElementById('a21').value;
      let a22 = +document.getElementById('a22').value;
      let a23 = +document.getElementById('a23').value;
      let a31 = +document.getElementById('a31').value;
      let a32 = +document.getElementById('a32').value;
      let a33 = +document.getElementById('a33').value;
      let b1 = +document.getElementById('b1').value;
      let b2 = +document.getElementById('b2').value;
      let b3 = +document.getElementById('b3').value;

      let A = [[a11, a12, a13], [a21, a22, a23], [a31, a32, a33]];
      let Δ = det3x3(A);

      if (Δ === 0) {
        document.getElementById('resultat').innerHTML = "<strong>Le système n'a pas de solution unique (Δ = 0)</strong>";
        return;
      }

      let Δx = det3x3([[b1, a12, a13], [b2, a22, a23], [b3, a32, a33]]);
      let Δy = det3x3([[a11, b1, a13], [a21, b2, a23], [a31, b3, a33]]);
      let Δz = det3x3([[a11, a12, b1], [a21, a22, b2], [a31, a32, b3]]);

      let x1 = Δ1 / Δ;
      let x2 = Δ2 / Δ;
      let x3 = Δ3 / Δ;

      document.getElementById('resultat').innerHTML =
        `<div class="delta">
          <strong>Δ = ${Δ}</strong><br>
          Δ₁ = ${Δx}, Δ₂ = ${Δy}, Δ₃ = ${Δz}<br><br>
          <strong>Résultats :</strong><br>
          X = Δx / Δ = ${x1.toFixed(4)}<br>
          Y = Δy / Δ = ${x2.toFixed(4)}<br>
          Z = Δz / Δ = ${x3.toFixed(4)}
        </div>`;
    }

    function reinitialiser() {
      const champs = [
        'a11', 'a12', 'a13',
        'a21', 'a22', 'a23',
        'a31', 'a32', 'a33',
        'b1', 'b2', 'b3'
      ];

      champs.forEach(id => document.getElementById(id).value = '');
      document.getElementById('resultat').innerHTML = '';
    }
  </script>
</body>
</html>
